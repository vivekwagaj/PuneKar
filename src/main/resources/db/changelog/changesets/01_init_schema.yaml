databaseChangeLog:
  - changeSet:
        id: 0-drop-all-if-empty
        author: punekar-agent
        changes:
        - sql:
            splitStatements: false
            stripComments: true
            sql: |
              DROP TABLE IF EXISTS votes CASCADE;
              DROP TABLE IF EXISTS verifications CASCADE;
              DROP TABLE IF EXISTS comments CASCADE;
              DROP TABLE IF EXISTS issue_images CASCADE;
              DROP TABLE IF EXISTS issues CASCADE;
              DROP TABLE IF EXISTS users CASCADE;
              DROP TABLE IF EXISTS wards CASCADE;
  - changeSet:
      id: 1-wards
      author: punekar-agent
      changes:
        - createTable:
            tableName: wards
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: zone
                  type: VARCHAR(255)
              - column:
                  name: created_at
                  type: TIMESTAMP

  - changeSet:
      id: 2-users
      author: punekar-agent
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: firebase_uid
                  type: VARCHAR(128)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: username
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: email
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password_hash
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: full_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(50)
              - column:
                  name: profile_picture_url
                  type: VARCHAR(255)
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: ward_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_user_ward
                    references: wards(id)

  - changeSet:
      id: 3-issues
      author: punekar-agent
      changes:
        - createTable:
            tableName: issues
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_issue_user
                    references: users(id)
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: category
                  type: VARCHAR(100)
              - column:
                  name: location
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: ward_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_issue_ward
                    references: wards(id)

  - changeSet:
      id: 4-issue-images
      author: punekar-agent
      changes:
        - createTable:
            tableName: issue_images
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: issue_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_image_issue
                    references: issues(id)
              - column:
                  name: image_url
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

  - changeSet:
      id: 5-comments
      author: punekar-agent
      changes:
        - createTable:
            tableName: comments
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: issue_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_comment_issue
                    references: issues(id)
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_comment_user
                    references: users(id)
              - column:
                  name: parent_comment_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_comment_parent
                    references: comments(id)
              - column:
                  name: content
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP

  - changeSet:
      id: 6-verifications
      author: punekar-agent
      changes:
        - createTable:
            tableName: verifications
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: issue_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_verification_issue
                    references: issues(id)
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_verification_user
                    references: users(id)
              - column:
                  name: image_url
                  type: VARCHAR(255)
              - column:
                  name: note
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
        - addUniqueConstraint:
            tableName: verifications
            columnNames: issue_id, user_id
            constraintName: uq_verification_issue_user

  - changeSet:
      id: 7-votes
      author: punekar-agent
      changes:
        - createTable:
            tableName: votes
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_vote_user
                    references: users(id)
              - column:
                  name: issue_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_vote_issue
                    references: issues(id)
              - column:
                  name: comment_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_vote_comment
                    references: comments(id)
              - column:
                  name: target_id
                  type: BIGINT
              - column:
                  name: target_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: vote_type
                  type: VARCHAR(50)
        - addUniqueConstraint:
            tableName: votes
            columnNames: user_id, target_id, target_type
            constraintName: uq_vote_user_target
